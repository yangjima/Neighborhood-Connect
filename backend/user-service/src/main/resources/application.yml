server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/neighborhood?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: neighborhood-connect-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000  # 24 hours in milliseconds
